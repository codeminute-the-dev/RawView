name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label (e.g. 0.1.0)"
        required: true
        default: "0.1.0"

permissions:
  contents: write

jobs:
  # ── Linux: .deb + .AppImage + .rpm ────────────────────────────────────────
  linux:
    name: Linux packages
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y alien dpkg-dev

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Download and extract Ghidra 12.0.4
        run: |
          url="https://github.com/NationalSecurityAgency/ghidra/releases/download/Ghidra_12.0.4_build/ghidra_12.0.4_PUBLIC_20260303.zip"
          zip_path="$RUNNER_TEMP/ghidra.zip"
          extract_dir="$RUNNER_TEMP/ghidra"
          curl -L --progress-bar -o "$zip_path" "$url"
          unzip -q "$zip_path" -d "$extract_dir"
          inner=$(find "$extract_dir" -maxdepth 1 -type d -name "ghidra_*_PUBLIC" | head -1)
          echo "GHIDRA_INSTALL_DIR=$inner" >> "$GITHUB_ENV"

      - name: Compile Java bridge
        run: python -m rawview.scripts.compile_java

      - name: Build PyInstaller bundle
        run: bash build-linux.sh

      - name: Build .deb
        run: bash build-deb.sh --skip-pyinstaller

      - name: Build .AppImage
        run: bash build-appimage.sh --skip-pyinstaller

      - name: Build .rpm
        run: bash build-rpm.sh --skip-pyinstaller

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            dist_installer/*.deb
            dist_installer/*.AppImage
            dist_installer/*.rpm
          if-no-files-found: error

  # ── Windows: .msi ─────────────────────────────────────────────────────────
  windows:
    name: Windows MSI
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Download and extract Ghidra 12.0.4
        run: |
          $url = "https://github.com/NationalSecurityAgency/ghidra/releases/download/Ghidra_12.0.4_build/ghidra_12.0.4_PUBLIC_20260303.zip"
          $zip = "$env:RUNNER_TEMP\ghidra.zip"
          $dir = "$env:RUNNER_TEMP\ghidra"
          Invoke-WebRequest $url -OutFile $zip
          Expand-Archive $zip -DestinationPath $dir
          $inner = Get-ChildItem $dir -Directory | Where-Object { $_.Name -like "ghidra_*_PUBLIC" } | Select-Object -First 1
          echo "GHIDRA_INSTALL_DIR=$($inner.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        shell: pwsh

      - name: Compile Java bridge
        run: python -m rawview.scripts.compile_java
        shell: cmd

      - name: Install WiX Toolset 3.14
        run: |
          $url = "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip"
          $zip = "$env:RUNNER_TEMP\wix314.zip"
          $dir = "$env:RUNNER_TEMP\wix314"
          Invoke-WebRequest $url -OutFile $zip
          Expand-Archive $zip -DestinationPath $dir
          echo "$dir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "WIX=$dir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        shell: pwsh

      - name: Build MSI
        run: powershell -ExecutionPolicy Bypass -File scripts\build-msi.ps1
        shell: cmd

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: dist_installer\RawView-*.msi
          if-no-files-found: error

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [linux, windows]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux packages
        uses: actions/download-artifact@v4
        with:
          name: linux-packages
          path: dist_installer/

      - name: Download Windows MSI
        uses: actions/download-artifact@v4
        with:
          name: windows-msi
          path: dist_installer/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "RawView ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist_installer/rawview_*.deb
            dist_installer/RawView-*.AppImage
            dist_installer/rawview-*.rpm
            dist_installer/RawView-*.msi
